<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>辞典 — 星読み辞典</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="stars-bg" id="stars-bg"></div>

  <nav>
    <div class="nav-inner">
      <a class="nav-logo" href="index.html">⭐ <span>星読み</span>辞典</a>

      <p>天体・ハウス・アスペクトをクリックすると詳細を表示。マイメモも書ける。</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="planet">🪐 惑星</button>

    <div class="item-list" id="item-list">
      <p class="no-results" style="color:var(--text-muted)">読み込み中…</p>

  <div class="modal-overlay" id="modal-overlay">
